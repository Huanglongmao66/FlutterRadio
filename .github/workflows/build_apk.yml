name: Build and Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.7'
          channel: 'stable'

      - name: Get dependencies
        run: cd online_fm_radio && flutter pub get

      - name: Generate app icons
        run: cd online_fm_radio && flutter pub run flutter_launcher_icons

      - name: Build APK
        run: cd online_fm_radio && flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: online_fm_radio/build/app/outputs/flutter-apk/app-release.apk
